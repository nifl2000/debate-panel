name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  NODE_VERSION: 20
  PYTHON_VERSION: '3.11'

jobs:
  backend-tests:
    name: Backend Tests (Python — legacy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Run tests
        run: |
          cd backend
          pytest -v --tb=short

  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            workers/package-lock.json
      - name: Install root dependencies
        run: npm ci
      - name: Install workspace dependencies
        run: npm run postinstall

  workers-tests:
    name: Workers Tests (TypeScript)
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            workers/package-lock.json
      - name: Install root dependencies
        run: npm ci
      - name: Install workspace dependencies
        run: npm run postinstall
      - name: Type check
        run: cd workers && npm run typecheck
      - name: Run tests
        run: cd workers && npm test

  frontend-tests:
    name: Frontend Tests + Build
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            workers/package-lock.json
      - name: Install root dependencies
        run: npm ci
      - name: Install workspace dependencies
        run: npm run postinstall
      - name: Run tests
        run: cd frontend && npm test -- --run
      - name: Build
        run: cd frontend && npm run build

  deploy-workers:
    name: Deploy Workers
    needs: [backend-tests, workers-tests, frontend-tests]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            workers/package-lock.json
      - name: Install root dependencies
        run: npm ci
      - name: Install workspace dependencies
        run: npm run postinstall
      - name: Run D1 migrations
        run: |
          cd workers
          npx wrangler d1 migrations apply debate-panel-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Deploy Workers
        run: |
          cd workers
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-frontend:
    name: Deploy Frontend to Pages
    needs: [backend-tests, workers-tests, frontend-tests]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            workers/package-lock.json
      - name: Install root dependencies
        run: npm ci
      - name: Install workspace dependencies
        run: npm run postinstall
      - name: Build
        run: |
          cd frontend
          VITE_API_BASE_URL="${{ secrets.WORKER_URL || 'https://debate-panel-api.nicoflohr.workers.dev' }}" npm run build
      - name: Deploy to Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=debate-panel --branch=master
